#!/usr/bin/env python3
import pandas as pd, csv, sys, re
from pathlib import Path

# ===== 输入 =====
DMC_BED = "RSWGBSWT_DMCs_minDepth5.bed"
ALL_BED = "RSWGBSWT_CpGs_minDepth5.bed"
BIN_SIZES = [200, 500, 700, 1000]
EXCLUDE = {"chrUn", "chrY"}   # 若无也没关系

def read_bed_any(path):
    # 自动推断分隔；去掉列名里的引号/空白；把内容里的引号也去掉
    df = pd.read_csv(path, sep=None, engine="python", header=0, dtype=str)
    df.columns = [c.replace('"','').strip() for c in df.columns]
    df = df.applymap(lambda x: x.replace('"','').strip() if isinstance(x,str) else x)
    return df

def find_chrpos_col(df):
    # 找到像 'chrI.10000772' 的那一列；优先列名包含 'chr'
    pat = re.compile(r'^chr[^.\s]+\.\d+$')
    cols = list(df.columns)
    # 先按列名含 chr 过滤
    cand = [c for c in cols if re.search(r'chr', c, re.I)]
    check_cols = cand + [c for c in cols if c not in cand]
    for c in check_cols:
        s = df[c].astype(str).head(200)
        if s.map(lambda v: bool(pat.match(v))).mean() > 0.8:
            return c
    # 兜底：找不到就返回第一列
    return cols[0]

def standardize_tables(dmc_df, all_df):
    chrcol_dmc  = find_chrpos_col(dmc_df)
    chrcol_all  = find_chrpos_col(all_df)

    # 拆出真正的染色体名；start 用已有 'start' 列（数字）
    for df, cc in [(dmc_df, chrcol_dmc), (all_df, chrcol_all)]:
        df["chrom"] = df[cc].astype(str).str.split(".", n=1, expand=True)[0]

    # 确保存在 start 列；若没有，试图从第二列取；再不行就报错
    def ensure_start(df, name):
        if "start" in df.columns:
            st = pd.to_numeric(df["start"], errors="coerce")
            if st.notna().mean() < 0.8:
                # 若 start 列不可用，尝试从拆出来的 chrpos 里取第二段
                st2 = pd.to_numeric(df[df.columns[0]].astype(str).str.split(".", n=1, expand=True)[1], errors="coerce")
                if st2.notna().mean() > 0.8:
                    df["start"] = st2
                else:
                    raise SystemExit(f"{name}: 找不到可靠的 start 列")
            else:
                df["start"] = st.astype(int)
        else:
            # 没有 start 列：尝试从 chrpos 拆出来
            st = pd.to_numeric(df[df.columns[0]].astype(str).str.split(".", n=1, expand=True)[1], errors="coerce")
            if st.notna().mean() > 0.8:
                df["start"] = st.astype(int)
            else:
                raise SystemExit(f"{name}: 缺少 start 列且无法从 chr.pos 拆出")

    ensure_start(dmc_df,  "DMC")
    ensure_start(all_df,  "AllCpG")

    # DMC 标签列：result_GS / result / status / label / dmc / type 任取其一
    tag_candidates = [c for c in dmc_df.columns if c.lower() in
                      ("result_gs","result","status","label","dmc","type")]
    if not tag_candidates:
        raise SystemExit("DMC 文件里找不到差异标签列（例如 result_GS）")
    dmc_df = dmc_df.rename(columns={tag_candidates[0]: "result_GS"})

    dmc_keep  = dmc_df[["chrom","start","result_GS"]].drop_duplicates().copy()
    allc_keep = all_df[["chrom","start"]].drop_duplicates().copy()

    if EXCLUDE:
        dmc_keep  = dmc_keep [~dmc_keep["chrom"].isin(EXCLUDE)].copy()
        allc_keep = allc_keep[~allc_keep["chrom"].isin(EXCLUDE)].copy()

    return dmc_keep, allc_keep

def centered_nonoverlap_bins(points_df, size):
    half = size // 2
    out = []
    for chrom, sub in points_df.groupby("chrom", sort=False):
        bed = (sub[["start"]]
               .assign(s=lambda x: (x["start"] - half).clip(lower=0),
                       e=lambda x: x["start"] + half)
               .sort_values(["s","e"])[["s","e"]]
               .to_numpy())
        kept, last_end = [], -1
        for s,e in bed:
            if s >= last_end:
                kept.append((int(s), int(e)))
                last_end = e
        for s,e in kept:
            out.append((chrom, s, e))
    return pd.DataFrame(out, columns=["chrom","start","end"])

def to_gtf(bed_df, label, size):
    gtf = bed_df.copy()
    gtf["seqname"] = gtf["chrom"]
    gtf["source"]  = "none"
    gtf["feature"] = "transcript"
    gtf["score"]   = "."
    gtf["strand"]  = "+"
    gtf["frame"]   = "."
    gtf["start1"]  = gtf["start"] + 1  # 1-based
    gtf["end1"]    = gtf["end"]
    gtf["attribute"] = 'gene_id "' + f"{label}_bin{size}" + '";'
    return gtf[["seqname","source","feature","start1","end1","score","strand","frame","attribute"]]

# ===== 读取并标准化 =====
dmc_raw  = read_bed_any(DMC_BED)
all_raw  = read_bed_any(ALL_BED)
dmc, allc = standardize_tables(dmc_raw, all_raw)

# non-DMC = AllCpG 减去 DMC
non = allc.merge(dmc[["chrom","start"]], on=["chrom","start"], how="left", indicator=True)
non = non[non["_merge"]=="left_only"][["chrom","start"]].reset_index(drop=True)

print(f"N DMC={len(dmc)} | N nonCpG={len(non)}", file=sys.stderr)

# ===== 生成四个 bin 大小的 GTF =====
outdir = Path("bins_gtf_rswat")
outdir.mkdir(exist_ok=True)

for S in BIN_SIZES:
    dmc_bins = centered_nonoverlap_bins(dmc[["chrom","start"]], S)
    # non：抽 >=3x，去重叠后截断为与 DMC 等量
    non_samp = non.sample(min(len(non), max(1, len(dmc)*3)), random_state=1)
    non_bins = centered_nonoverlap_bins(non_samp[["chrom","start"]], S)
    if len(non_bins) >= len(dmc_bins) and len(dmc_bins) > 0:
        non_bins = non_bins.iloc[:len(dmc_bins), :].copy()

    g1 = to_gtf(dmc_bins, "DMC", S)
    g2 = to_gtf(non_bins, "non", S)
    gtf = pd.concat([g1, g2], ignore_index=True)

    out_gtf = outdir / f"RSWAT_bins_{S}.gtf"
    gtf.to_csv(out_gtf, sep="\t", header=False, index=False,
               quoting=csv.QUOTE_NONE, escapechar="\\")
    print(f"[OK] {out_gtf}: DMC={len(g1)} non={len(g2)}", file=sys.stderr)




